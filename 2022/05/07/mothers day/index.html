<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>MVVM-demo</title>
</head>

<body>
<div id="app">
    <div v-html="message"></div>
    作者信息：
    <input class="input" type="text" v-model="author.name">
    <button v-on:click="clickBtn">改变文本框内容</button>
    <p>{{author.name}}</p>
    <p>{{author.github}}</p>
    {{getAuthor}}
</div>

<script type="module">
    import { MVVM } from "../../../../../../js/MVVM.js"
    let vm = new MVVM({//新建mvvm对象，属性有el和data
        el: '#app',
        data: {
            author: {
                name:'StantonJY',
                Blog:'https://stantonjoy.github.io/'
            },
            message:'<h1>MVVM框架demo</h1>'
        },
        computed: {
            getAuthor:function(){
                return this.author.name + "-" + this.author.Blog;
            }
        },
        methods: {
            clickBtn: function(e) {
                this.author.name = "sjy_clickBtn"
            }
        }
    })
</script>
</body>

</html>
